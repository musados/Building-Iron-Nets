# IronNets — server + web, plain HTTP behind your production Caddy.
# See DEPLOY.md for the production Caddyfile example.
services:
  server:
    build: ./server
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "8080:80"
    restart: unless-stopped
